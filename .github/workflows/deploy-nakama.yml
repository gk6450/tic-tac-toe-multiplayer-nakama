name: Deploy to EC2

on:
  push:
    branches: [main]
    paths:
      - 'nakama/**'
      - 'web-app/**'
      - 'nginx/**'
      - 'docker-compose.yml'
      - 'docker-compose.postgres.yml'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/tic-tac-toe-multiplayer-nakama

            echo "=== Pulling latest code ==="
            git pull origin main

            echo "=== Ensuring Docker Buildx is up to date ==="
            ARCH=$(uname -m); case "$ARCH" in x86_64) ARCH=amd64;; aarch64) ARCH=arm64;; esac
            BUILDX_VERSION=$(curl -s https://api.github.com/repos/docker/buildx/releases/latest | grep tag_name | cut -d '"' -f 4)
            sudo mkdir -p /usr/local/lib/docker/cli-plugins/
            sudo curl -SL "https://github.com/docker/buildx/releases/download/${BUILDX_VERSION}/buildx-${BUILDX_VERSION}.linux-${ARCH}" \
              -o /usr/local/lib/docker/cli-plugins/docker-buildx
            sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-buildx

            echo "=== Building Nakama module ==="
            cd nakama
            npm install --production=false
            npx tsc
            cd ..

            echo "=== Rebuilding and restarting services ==="
            docker compose build web
            docker compose up -d --force-recreate nakama web

            echo "=== Waiting for health check ==="
            sleep 10
            docker compose ps
            echo "=== Deployment complete ==="
